      <div class="auth-back" onclick="renderAuthScreen('choice')">←</div>
      <div class="auth-logo">📝</div>
      <div class="auth-title">Регистрация</div>
      <div class="auth-sub">Создайте новый аккаунт</div>
      <div class="auth-field">
        <label>Имя</label>
        <input type="text" id="regName" placeholder="Ваше имя">
      </div>
      <div class="auth-field">
        <label>Номер телефона или логин</label>
        <input type="text" id="regUser" placeholder="+7 999 123-45-67 или username">
      </div>
      <div class="auth-field">
        <label>Пароль</label>
        <input type="password" id="regPass" placeholder="Придумайте пароль">
      </div>
      <div class="auth-error" id="regError"></div>
      <button class="auth-btn auth-btn-primary" id="regBtn" onclick="handleRegister()">Зарегистрироваться</button>
      <div class="auth-switch">Уже есть аккаунт? <span onclick="renderAuthScreen('login')">Войти</span></div>
    `;
    document.getElementById('regPass').addEventListener('keydown', e=>{ if(e.key==='Enter') handleRegister(); });
  }
  if(screen === 'registerVerify'){
    const phone = pendingRegistration ? pendingRegistration.user : '';
    card.innerHTML = `
      <div class="auth-back" onclick="renderAuthScreen('register')">←</div>
      <div class="auth-logo">📲</div>
      <div class="auth-title">Подтверждение номера</div>
      <div class="auth-sub">Мы отправили SMS с кодом на ${phone}</div>
      <div class="auth-field">
        <label>Код из SMS</label>
        <input type="text" id="smsCode" placeholder="123456" inputmode="numeric">
      </div>
      <div class="auth-error" id="smsCodeError"></div>
      <button class="auth-btn auth-btn-primary" id="smsConfirmBtn" onclick="handleConfirmSmsCode()">Подтвердить</button>
    `;
    document.getElementById('smsCode').addEventListener('keydown', e=>{ if(e.key==='Enter') handleConfirmSmsCode(); });
  }
}

function showAuthErr(id, msg){
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}

async function handleLogin(){
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.classList.remove('show');

  if(!user || !pass){ showAuthErr('loginError','Заполните все поля'); return; }

  btn.disabled = true; btn.textContent = 'Проверяем...';
  try{
    const acc = await findAccount(user);
    if(!acc){ showAuthErr('loginError','Аккаунт не найден. Зарегистрируйтесь.'); return; }
    if(acc.pass !== pass){ showAuthErr('loginError','Неверный пароль'); return; }
    rememberDevice(user);
    await completeAuth(acc.name, accId(user), acc);
  }catch(e){
    console.error(e);
    showAuthErr('loginError','Ошибка сети. Проверьте подключение к базе данных.');
  }finally{
    btn.disabled = false; btn.textContent = 'Войти';
  }
}

async function handleRegister(){
  const name = document.getElementById('regName').value.trim();
  const user = document.getElementById('regUser').value.trim();
  const pass = document.getElementById('regPass').value;
  const errEl = document.getElementById('regError');
  const btn = document.getElementById('regBtn');
  errEl.classList.remove('show');

  if(!name || !user || !pass){ showAuthErr('regError','Заполните все поля'); return; }

  btn.disabled = true; btn.textContent = 'Создаём аккаунт...';
  try{
    const existing = await findAccount(user);
    if(existing){ showAuthErr('regError','Такой аккаунт уже существует'); return; }

    if(isPhoneLogin(user)){
      if(!phoneAuthReady){
        showAuthErr('regError','Проверка по SMS недоступна (Firebase Auth не настроен).');
        return;
      }
      // для телефона — сначала подтверждаем номер кодом из SMS, аккаунт создастся после успешной проверки
      await startPhoneVerification(name, user, pass);
      return;
    }

    // обычный логин (без +) — регистрация без SMS, как раньше
    await createAccount(user, name, pass);
    rememberDevice(user);
    await completeAuth(name, accId(user), {isPremium:false, premiumGiftedBy:null});
  }catch(e){
    console.error(e);
    showAuthErr('regError','Ошибка сети. Проверьте подключение к базе данных.');
  }finally{
    btn.disabled = false; btn.textContent = 'Зарегистрироваться';
  }
}

function demoLogin(){
  completeAuth('Разработчик', 'demo_user');
}

// запоминаем логин на этом устройстве, чтобы не вводить пароль заново при каждом открытии
function rememberDevice(user){
  localStorage.setItem('tg_current_login', user.trim());
}
function logout(){
  stopPresenceHeartbeat(currentAccId);
  localStorage.removeItem('tg_current_login');

  // Отписываемся от всех активных Firestore-слушателей и таймеров,
  // чтобы не осталось "хвостов" от предыдущей сессии
  if(typeof unsubscribeChats === 'function'){ unsubscribeChats(); unsubscribeChats = null; }
  if(typeof unsubscribeDirectChats === 'function'){ unsubscribeDirectChats(); unsubscribeDirectChats = null; }
  if(typeof unsubscribeIncomingCalls === 'function'){ unsubscribeIncomingCalls(); unsubscribeIncomingCalls = null; }
  if(typeof unsubscribeCallDoc === 'function'){ unsubscribeCallDoc(); unsubscribeCallDoc = null; }
  if(presencePollTimer){ clearInterval(presencePollTimer); presencePollTimer = null; }

  // Сбрасываем состояние аккаунта в памяти, вместо перезагрузки всей страницы
  // (перезагрузка страницы требует повторного запроса к хостингу, и именно
  // на этом шаге у вас вылетала ошибка 500)
  currentAccId = null;
  currentUserName = null;
  currentUserIsPremium = false;
  currentUserPremiumGiftedBy = null;
  currentUserAvatarId = null;
  localChats = [];
  directChats = [];
  chats = [];
  chatsDocRef = null;
  activeChatId = null;
  starBalance = 1250;

  document.getElementById('authOverlay').style.display = 'flex';
  document.getElementById('app').classList.add('blurred');
  renderAuthScreen('choice');
}

async function tryAutoLogin(){
  const saved = localStorage.getItem('tg_current_login');
  if(!saved) return false;
  try{
    const acc = await findAccount(saved);
    if(acc){ await completeAuth(acc.name, accId(saved), acc); return true; }
  }catch(e){ console.warn('Автовход не удался:', e); }
  return false;
}

async function completeAuth(name, userAccId, accData={}){
  currentUserName = name;
  currentUserIsPremium = !!accData.isPremium;
  currentUserPremiumGiftedBy = accData.premiumGiftedBy || null;
  currentUserAvatarId = getUserAvatarId(userAccId);
  if(userAccId){
    await loadAndWatchChats(userAccId);
    watchDirectChats(userAccId);
    watchIncomingCalls(userAccId);
    startPresenceHeartbeat(userAccId);
    startPresencePolling();
  }
  document.getElementById('authOverlay').style.display = 'none';
  document.getElementById('app').classList.remove('blurred');
  showToast(`Добро пожаловать, ${name}! 👋`);
  // если пользователю подарили Premium — сообщаем об этом один раз
  if(currentUserIsPremium && currentUserPremiumGiftedBy && userAccId){
    const noticeKey = 'tg_premium_notice_' + userAccId;
    if(!localStorage.getItem(noticeKey)){
      localStorage.setItem(noticeKey, '1');
      setTimeout(()=> showToast(`🎉 ${currentUserPremiumGiftedBy} ${t('premiumGiftNotice')}`), 1200);
    }
  }
}

/* ---------------- MOBILE VIEWPORT / KEYBOARD FIX ---------------- */
// На телефонах при открытии клавиатуры адресная строка и 100vh ведут себя нестабильно —
// подстраиваем реальную высоту приложения под visualViewport, чтобы поле ввода всегда было видно.
(function(){
  function applyHeight(){
    const h = (window.visualViewport ? window.visualViewport.height : window.innerHeight) + 'px';
    document.getElementById('app').style.height = h;
    document.getElementById('authOverlay').style.height = h;
  }
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', applyHeight);
    window.visualViewport.addEventListener('scroll', applyHeight);
  }
  window.addEventListener('resize', applyHeight);
  applyHeight();

  // при фокусе на поле ввода сообщений — подскроллить его в зону видимости (после открытия клавиатуры)
  document.addEventListener('focusin', function(e){
    if(e.target && e.target.tagName === 'INPUT'){
      setTimeout(()=> e.target.scrollIntoView({block:'center', behavior:'smooth'}), 250);
    }
  });
})();

  document.getElementById('authCard').innerHTML = `<div class="auth-sub" style="margin:20px 0;">Загрузка...</div>`;
  const loggedIn = await tryAutoLogin();
  if(!loggedIn) renderAuthScreen('choice');
})();
renderChatList();
