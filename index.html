<style>
  :root{
    --tg-blue: #2AABEE;
    --tg-blue-dark: #229ED9;
    --tg-accent: #54A9EB;
    --bg-sidebar: #ffffff;
    --bg-chat: #e6ebee;
    --bg-app: #f4f4f5;
    --border: #e3e6e8;
    --text-main: #17212b;
    --text-secondary: #707579;
    --bubble-out: #effdde;
    --bubble-in: #ffffff;
    --danger: #e53935;
    --gold: #d9a441;
    --star: #f5a623;
    --radius-lg: 14px;
    --radius-md: 10px;
    --radius-sm: 6px;
    --shadow: 0 2px 10px rgba(0,0,0,0.06);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  body.dark{
    --bg-sidebar: #17212b;
    --bg-chat: #0e1621;
    --bg-app: #0e1621;
    --border: #232e3a;
    --text-main: #f0f2f4;
    --text-secondary: #8a97a3;
    --bubble-out: #2b5278;
    --bubble-in: #182533;
    --shadow: 0 2px 10px rgba(0,0,0,0.35);
  }
  body.dark .fab{ box-shadow:0 4px 14px rgba(0,0,0,0.55); }
  body.dark .modal{ box-shadow:0 10px 40px rgba(0,0,0,0.6); }
  body.dark ::-webkit-scrollbar-thumb{ background: rgba(255,255,255,0.18); }
  body.dark .empty-state svg circle{ fill:#1c2733; }
  body.dark .toggle{ background:#2b3945; }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family: var(--font);
    background: var(--bg-app);
    color: var(--text-main);
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }
  .app{
    display:flex;
    height:100vh;
    height:100dvh;
    max-width:1400px;
    margin:0 auto;
    background: var(--bg-app);
  }

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:380px;
    min-width:320px;
    background: var(--bg-sidebar);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
  }
  .sidebar-top{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 14px;
    border-bottom:1px solid var(--border);
  }
  .icon-btn{
    width:40px; height:40px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    background:transparent;
    border:none;
    color: var(--text-secondary);
    flex-shrink:0;
    transition: background .15s;
  }
  .icon-btn:hover{ background: rgba(120,120,120,0.12); }
  .search-box{
    flex:1;
    background: var(--bg-app);
    border-radius:20px;
    display:flex;
    align-items:center;
    padding:0 12px;
    height:38px;
    gap:8px;
  }
  .search-box input{
    border:none; outline:none; background:transparent;
    flex:1; font-size:14px; color:var(--text-main);
  }
  .chat-list{
    flex:1;
    overflow-y:auto;
  }
  .chat-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 14px;
    cursor:pointer;
    border-bottom:1px solid transparent;
    position:relative;
  }
  .chat-item:hover{ background: rgba(120,120,120,0.08); }
  .chat-item.active{ background: var(--tg-blue); }
  .chat-item.active .chat-name,
  .chat-item.active .chat-preview,
  .chat-item.active .chat-time{ color:#fff; }
  .avatar{
    width:52px; height:52px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:600; font-size:18px;
    flex-shrink:0;
    background: linear-gradient(135deg,#5ec1ff,#2a8ffc);
    position:relative;
  }
  .online-dot{
    position:absolute; right:0; bottom:0;
    width:13px; height:13px; border-radius:50%;
    background:#4cd964;
    border:2.5px solid var(--bg-sidebar);
    box-sizing:content-box;
  }
  .main-header .avatar .online-dot{ border-color: var(--bg-chat); }
  .avatar.g1{background:linear-gradient(135deg,#ff885e,#ff516a);}
  .avatar.g2{background:linear-gradient(135deg,#82d888,#2ab561);}
  .avatar.g3{background:linear-gradient(135deg,#c391ff,#7c5cff);}
  .avatar.g4{background:linear-gradient(135deg,#ffd15e,#ffa63e);}
  .avatar.g5{background:linear-gradient(135deg,#63d7d1,#2aa9a3);}
  .chat-info{ flex:1; min-width:0; }
  .chat-row1{ display:flex; justify-content:space-between; align-items:center; }
  .chat-name{ font-weight:600; font-size:15px; }
  .chat-time{ font-size:12px; color:var(--text-secondary); flex-shrink:0; margin-left:6px;}
  .chat-row2{ display:flex; justify-content:space-between; align-items:center; margin-top:2px;}
  .chat-preview{
    font-size:13.5px; color:var(--text-secondary);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .badge{
    background: var(--tg-blue);
    color:#fff; font-size:12px; font-weight:600;
    min-width:20px; height:20px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    padding:0 6px; flex-shrink:0;
  }
  .chat-item.active .badge{ background:#fff; color:var(--tg-blue); }
  .pinned-icon{ color: var(--text-secondary); margin-right:2px; }

  /* long-press context menu for chat list items */
  .ctx-menu{
    position:fixed;
    width:220px;
    background: var(--bg-sidebar);
    border-radius:12px;
    box-shadow:0 6px 24px rgba(0,0,0,0.25);
    z-index:60;
    overflow:hidden;
    animation: ctxPop .12s ease-out;
  }
  @keyframes ctxPop{ from{opacity:0; transform:scale(.92);} to{opacity:1; transform:scale(1);} }
  .ctx-menu .settings-item{ padding:11px 14px; }
  .ctx-menu .settings-item .ic{ width:30px; height:30px; font-size:14px; }
  .chat-item.long-pressing{ background: rgba(120,120,120,0.16); }

  /* archived chats row */
  .archive-row{
    display:flex; align-items:center; gap:12px;
    padding:10px 14px; cursor:pointer;
    border-bottom:1px solid var(--border);
  }
  .archive-row:hover{ background: rgba(120,120,120,0.08); }
  .archive-row .avatar{ background: linear-gradient(135deg,#9aa5ad,#707579); font-size:22px; }
  .archive-row .chat-name{ font-weight:600; font-size:15px; }
  .archive-back{
    display:flex; align-items:center; gap:10px;
    padding:12px 14px; cursor:pointer;
    border-bottom:1px solid var(--border);
    font-weight:600; font-size:14px;
    color:var(--text-secondary);
  }
  .archive-back:hover{ background: rgba(120,120,120,0.08); }

  /* group creation contact rows with checkbox */
  .contact-row.selectable{ justify-content:space-between; }
  .contact-row.selectable .check{
    width:22px; height:22px; border-radius:50%;
    border:2px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-size:13px; color:#fff; flex-shrink:0;
  }
  .contact-row.selectable.selected .check{
    background: var(--tg-blue); border-color: var(--tg-blue);
  }
  .selected-chips{
    display:flex; flex-wrap:wrap; gap:6px;
    padding:0 18px 10px;
  }
  .selected-chip{
    background: var(--bg-app); border-radius:14px;
    padding:5px 10px 5px 12px; font-size:13px;
    display:flex; align-items:center; gap:6px;
  }
  .selected-chip span.x{ cursor:pointer; color:var(--text-secondary); font-weight:700; }
  .group-name-field{
    margin:0 18px 10px;
  }
  .group-name-field input{
    width:100%; border:1px solid var(--border); border-radius:10px;
    padding:10px 12px; font-size:14px; background:var(--bg-app);
    color:var(--text-main); outline:none;
  }

  /* FAB */
  /* нижняя панель навигации (как в оригинальном Telegram mobile) */
  .bottom-nav{
    display:flex;
    align-items:stretch;
    height:58px;
    min-height:58px;
    background: var(--bg-sidebar);
    border-top:1px solid var(--border);
    flex-shrink:0;
  }
  .bottom-nav-item{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    cursor:pointer;
    color: var(--text-secondary);
    font-size:11px;
    font-weight:500;
    user-select:none;
    transition: color .15s;
  }
  .bottom-nav-item .bn-icon{ font-size:20px; line-height:1; }
  .bottom-nav-item.active{ color: var(--tg-blue); }
  .bottom-nav-item:active{ opacity:0.6; }

  .fab{
    position:absolute;
    right:24px; bottom:82px;
    width:56px; height:56px;
    border-radius:50%;
    background: var(--tg-blue);
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 12px rgba(42,171,238,0.5);
    cursor:pointer;
    border:none;
    font-size:26px;
    transition: transform .15s;
  }
  .fab:hover{ transform: scale(1.06); }

  /* ---------- MAIN AREA ---------- */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    background: var(--bg-chat);
    position:relative;
  }
  .main-header{
    height:60px;
    background: var(--bg-sidebar);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center;
    padding:0 16px;
    gap:12px;

<!-- БАННЕР: ПЕРЕЕЗД В ПРИЛОЖЕНИЕ (показывается только один раз) -->
<div id="moveBanner" style="position:relative; z-index:200; background:linear-gradient(135deg,#2AABEE,#229ED9); color:#fff; padding:10px 14px; font-size:13.5px; line-height:1.4; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;">
  <span style="flex:1; min-width:200px;">
    📱 Мы переехали в приложение! Никаких вирусов — скачивайте и устанавливайте спокойно.
    <a href="https://drive.google.com/file/d/1dkxff9nzNv1gevFQEYE6WTYp6NtazgVY/view?usp=sharing" target="_blank" style="color:#fff; font-weight:700; text-decoration:underline; white-space:nowrap;">Скачать приложение</a>
  </span>
  <span onclick="document.getElementById('moveBanner').style.display='none'" style="cursor:pointer; font-weight:700; padding:0 6px; flex-shrink:0;">✕</span>
</div>
<script>
  // если баннер про переезд в приложение уже показывался этому пользователю — скрываем его навсегда
  (function(){
    var seenKey = 'tg_move_banner_seen';
    var banner = document.getElementById('moveBanner');
    if(localStorage.getItem(seenKey)){
      banner.style.display = 'none';
    } else {
      localStorage.setItem(seenKey, '1');
    }
  })();
</script>

<!-- AUTH OVERLAY -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card" id="authCard">
    <!-- содержимое рендерится через JS (renderAuthScreen) -->
  </div>
  <div id="recaptcha-container"></div>
</div>

<div class="app blurred" id="app">

  <!-- SIDEBAR -->
  <div class="sidebar" style="position:relative;">
    <div class="sidebar-top">
      <button class="icon-btn" id="menuBtn" onclick="toggleMenu()" title="Меню">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="searchInput" placeholder="Поиск" oninput="filterChats(this.value)">
      </div>
    </div>

    <!-- dropdown menu -->
    <div id="dropMenu" style="display:none; position:absolute; top:56px; left:10px; width:250px; background:var(--bg-sidebar); border-radius:12px; box-shadow:0 6px 24px rgba(0,0,0,0.2); z-index:30; overflow:hidden;">
      <div class="settings-item" onclick="openPanel('gifts')"><div class="ic" style="background:linear-gradient(135deg,#ff6fa5,#ff9a3c)">🎁</div><div class="label" id="dmGifts">Подарки</div></div>
      <div class="settings-item" onclick="openPanel('stars')"><div class="ic" style="background:linear-gradient(135deg,#ffb200,#ff7a00)">⭐</div><div class="label" id="dmStars">Мои звёзды</div></div>
      <div class="settings-item" onclick="openPanel('premium')"><div class="ic" style="background:linear-gradient(135deg,#6a5ae0,#e0678f)">💎</div><div class="label" id="dmPremium">Chats Premium</div></div>
      <div class="settings-item" onclick="toggleDark()"><div class="ic" style="background:#5b6b78">🌙</div><div class="label" id="dmDark">Ночная тема</div>
        <div class="toggle dark-toggle on" onclick="toggleDark(); event.stopPropagation()"><div class="knob"></div></div>
      </div>
      <div class="settings-item" onclick="openPanel('settings')"><div class="ic" style="background:#8a97a3">⚙️</div><div class="label" id="dmSettings">Настройки</div></div>
      <div class="settings-item" onclick="logout()"><div class="ic" style="background:#e53935">🚪</div><div class="label" id="dmLogout">Выйти</div></div>
    </div>

    <div class="chat-list" id="chatList"></div>

    <button class="fab" id="fabBtn" onclick="openModal('newChat')" title="Новый чат">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
    </button>

    <!-- НИЖНЯЯ ПАНЕЛЬ: Чаты / Настройки -->
    <div class="bottom-nav" id="bottomNav">
      <div class="bottom-nav-item active" id="bnChats" onclick="bottomNavGo('chats')">
        <div class="bn-icon">💬</div>
        <div id="bnChatsLabel">Чаты</div>
      </div>
      <div class="bottom-nav-item" id="bnSettings" onclick="bottomNavGo('settings')">
        <div class="bn-icon">⚙️</div>
        <div id="bnSettingsLabel">Настройки</div>
      </div>
    </div>
  </div>

const PRESENCE_ONLINE_TIMEOUT = 30000;
let presenceHeartbeatTimer = null;

function markPresence(accId, online){

  const beat = () => { if(document.visibilityState === 'visible') markPresence(accId, true); };
  beat();
  if(presenceHeartbeatTimer) clearInterval(presenceHeartbeatTimer);
  presenceHeartbeatTimer = setInterval(beat, 15000);
  document.addEventListener('visibilitychange', () => { if(document.visibilityState === 'visible') beat(); });
  window.addEventListener('beforeunload', () => markPresence(accId, false));
  window.addEventListener('pagehide', () => markPresence(accId, false));
}

}
// текст статуса ("в сети" / "был(а) в сети ...") по данным присутствия собеседника
function presenceStatusText(online, lastActive){
  const ru = currentLang === 'ru';
  const isRecentBeat = lastActive && (Date.now() - lastActive) < PRESENCE_ONLINE_TIMEOUT;
  if(online && isRecentBeat) return ru ? 'в сети' : 'online';
  if(!lastActive) return ru ? 'нет на связи' : 'offline';
  return (ru ? 'был(а) в сети ' : 'last seen ') + formatLastSeen(lastActive, ru);
}
function formatLastSeen(ts, ru){
  const diffMs = Date.now() - ts;
  const mins = Math.floor(diffMs / 60000);
  if(mins < 1) return ru ? 'только что' : 'just now';
  if(mins < 60) return ru ? `${mins} мин. назад` : `${mins}m ago`;
  const hours = Math.floor(mins / 60);
  if(hours < 24) return ru ? `${hours} ч. назад` : `${hours}h ago`;
  const d = new Date(ts);
  return d.toLocaleDateString(ru ? 'ru-RU' : 'en-US', {day:'2-digit', month:'2-digit'}) + ', ' + d.toLocaleTimeString(ru ? 'ru-RU' : 'en-US', {hour:'2-digit', minute:'2-digit'});
}

// подписываемся на настоящие личные чаты с другими пользователями (общий документ на двоих)
function watchDirectChats(accIdVal){
  if(!cloudReady) return;
  if(unsubscribeDirectChats) unsubscribeDirectChats();
  unsubscribeDirectChats = db.collection('directChats')
    .where('participants', 'array-contains', accIdVal)
    .onSnapshot({includeMetadataChanges:true}, snap => {
      // hasPendingWrites=true значит, что мы видим ещё не подтверждённую сервером собственную запись —
      // это соответствует состоянию "отправлено" (1 галочка), пока сообщение реально не долетело
      const isPending = snap.metadata.hasPendingWrites;
      const chatsToMarkRead = [];
      const newDirectChats = snap.docs.map(docSnap => {
        const data = docSnap.data();
        const partnerId = data.participants.find(p => p !== accIdVal) || accIdVal;
        const partnerName = (data.participantNames && data.participantNames[partnerId]) || 'Пользователь';
        const readUpTo = data.readUpTo || {};
        const myReadUpTo = readUpTo[accIdVal] || 0;
        const partnerReadUpTo = readUpTo[partnerId] || 0;
        const sortedRaw = (data.messages || []).slice().sort((a,b)=>(a.ts||0)-(b.ts||0));
        const messages = sortedRaw.map((m, idx) => {
          const out = m.senderId === accIdVal;
          let status;
          if(out){
            if(isPending && idx === sortedRaw.length - 1) status = 'sent'; // ещё не долетело до сервера
            else if((m.ts||0) <= partnerReadUpTo) status = 'read'; // собеседник открывал чат после этого сообщения
            else status = 'delivered'; // долетело, но собеседник ещё не прочитал
          }
          return {
            out, text: m.text, file: m.file || null, voice: m.voice || null, call: m.call || null,
            time: m.time, ts: m.ts || 0, status
          };
        });
        const last = messages[messages.length-1];
        const lastPreview = last ? (last.call ? callMessagePreviewText(last.call) : (last.voice ? '🎤 ' + t('voiceMessage') : (last.file ? (last.file.type && last.file.type.startsWith('image/') ? '🖼 ' + t('photoCaption') : '📎 ' + last.file.name) : last.text))) : t('chatCreated');
        // сохраняем ранее известный статус Premium/аватарки/присутствия, чтобы не мигало, пока не подгрузится актуальный
        const prev = directChats.find(c => c.partnerId === partnerId);
        const chatId = 'direct_' + docSnap.id;
        // если этот чат сейчас открыт и в нём есть непрочитанные входящие сообщения — отметим их прочитанными
        const lastIncoming = messages.slice().reverse().find(m => !m.out);
        if(activeChatId === chatId && lastIncoming && lastIncoming.ts > myReadUpTo){
          chatsToMarkRead.push(docSnap.id);
        }
        return {
          id: chatId,
          directId: docSnap.id,
          real: true,
          partnerId,
          name: partnerName,
          partnerIsPremium: prev ? !!prev.partnerIsPremium : false,
          partnerAvatarId: prev ? (prev.partnerAvatarId || null) : null,
          partnerOnline: prev ? !!prev.partnerOnline : false,
          partnerLastActive: prev ? (prev.partnerLastActive || null) : null,
          preview: lastPreview,
          time: last ? last.time : '',
          unread: 0,
          avatarClass: 'g'+((simpleHash(partnerId)%5)+1),
          avatarText: partnerName.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase(),
          pinned:false,
          persona:null,
          messages
        };
      });

      if(directChatsSoundInitialized){
        newDirectChats.forEach(nc => {
          const prevCount = directChatsMsgCounts[nc.directId] || 0;
          if(nc.messages.length > prevCount){
            const lastMsg = nc.messages[nc.messages.length-1];
            if(lastMsg && !lastMsg.out && !isChatMuted(nc.id)) playMessageSound();
          }
        });
      }
      newDirectChats.forEach(nc => { directChatsMsgCounts[nc.directId] = nc.messages.length; });
      directChatsSoundInitialized = true;

      directChats = newDirectChats;
      mergeAndRenderChats();
      refreshPartnerPremiumBadges();
      chatsToMarkRead.forEach(directId => markDirectChatReadById(directId, accIdVal));
    }, err => console.warn('Ошибка синхронизации личных чатов:', err));
}
// отмечаем в общем документе чата, что мы прочитали сообщения собеседника до текущего момента —
// именно это превращает у него "доставлено" (2 серые галочки) в "прочитано" (2 синие галочки)

// подтягиваем актуальный статус Chats Premium и присутствия (онлайн/был в сети) у собеседников
async function refreshPartnerPremiumBadges(){
  if(!cloudReady) return;
  const reals = directChats.filter(c=>c.real);
  for(const c of reals){
    try{
      const snap = await db.collection('accounts').doc(c.partnerId).get();
      const data = snap.exists ? snap.data() : {};
      const isPremium = !!data.isPremium;
      const avatarId = data.avatarId || null;
      const presence = data.presence || null;
      const isRecentBeat = presence && presence.lastActive && (Date.now() - presence.lastActive) < PRESENCE_ONLINE_TIMEOUT;
      const online = !!(presence && presence.online && isRecentBeat);
      const lastActive = presence ? presence.lastActive : null;
      let changed = false;
      if(c.partnerIsPremium !== isPremium){ c.partnerIsPremium = isPremium; changed = true; }
      if(c.partnerAvatarId !== avatarId){ c.partnerAvatarId = avatarId; changed = true; }
      if(c.partnerOnline !== online){ c.partnerOnline = online; changed = true; }
      if(c.partnerLastActive !== lastActive){ c.partnerLastActive = lastActive; changed = true; }
      if(changed){
        renderChatList(document.getElementById('searchInput').value);
        if(activeChatId === c.id) refreshOpenChatIfAny();
      }
    }catch(e){ /* игнорируем — бейдж/статус просто не обновятся в этот раз */ }
  }
}

function simpleHash(str){
  let h = 0;
  for(let i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) >>> 0; }
  return h;
}

}

           'Принято к сведению.','Согласен, давайте так и сделаем.'],

function pickRandom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function generateReply(chat, userText){
  const persona = chat.persona || 'friendly';
  const rule = KEYWORD_RULES.find(k => k.test.test(userText));
  const pool = rule ? rule.replies : (FALLBACK_REPLIES[persona] || FALLBACK_REPLIES.friendly);
  let reply = pickRandom(pool);
  if(chat.groupSender) reply = `${chat.groupSender}: ${reply}`;
  const messages = [reply];
  if(Math.random() < 0.22){
    let extra = pickRandom(FALLBACK_REPLIES[persona] || FALLBACK_REPLIES.friendly);
    if(chat.groupSender) extra = `${chat.groupSender}: ${extra}`;
    messages.push(extra);
  }
  return messages;
}

// генерируем короткий приятный "дзынь" через Web Audio API — без внешних файлов
function playMessageSound(){
  if(!notificationsOn) return;
  try{
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return;
    const ctx = window._notifAudioCtx || (window._notifAudioCtx = new Ctx());
    if(ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;

    const playTone = (freq, start, dur, peak) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now + start);
      gain.gain.setValueAtTime(0.0001, now + start);
      gain.gain.exponentialRampToValueAtTime(peak, now + start + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + start + dur);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now + start);
      osc.stop(now + start + dur + 0.02);
    };
    playTone(880, 0, 0.14, 0.22);
    playTone(1175, 0.09, 0.18, 0.18);
  }catch(e){ console.warn('Не удалось воспроизвести звук уведомления:', e); }
}

  const preDelay = 500 + Math.random()*900;
  setTimeout(()=>{
    // отметить как прочитано
    chat.messages.forEach(m => { if(m.out) m.status = 'read'; });
    if(activeChatId===chatId) renderMessages(chat);
    scheduleSaveChats();
    if(activeChatId===chatId){ updateHeaderStatus('печатает...', true); showTyping(); }
    const replies = generateReply(chat, userText);
    let cumulative = 700 + Math.random()*700;
    replies.forEach((text, i) => {
      setTimeout(()=>{
        const time = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
        if(activeChatId===chatId) hideTyping();
        chat.messages.push({out:false, text, time});
        chat.preview = text;
        chat.time = time;
        if(!isChatMuted(chat.id)) playMessageSound();
        if(activeChatId===chatId){
          renderMessages(chat);
          updateHeaderStatus(i === replies.length-1 ? 'в сети' : 'печатает...', i !== replies.length-1);
          if(i !== replies.length-1) showTyping();
        } else {
          chat.unread = (chat.unread||0) + 1;
        }
        renderChatList(document.getElementById('searchInput').value);
        scheduleSaveChats();
      }, cumulative);
      cumulative += 900 + text.length*30 + Math.random()*700;
    });
  }, preDelay);
}

/* ---------------- RENDER CHAT LIST ---------------- */
// 'normal' — обычный список чатов, 'archived' — просмотр черновиков/архива
let chatListView = 'normal';

function renderChatList(filter=''){
  const list = document.getElementById('chatList');
  list.innerHTML = '';

  if(chatListView === 'archived'){
    const back = document.createElement('div');
    back.className = 'archive-back';
    back.onclick = () => { chatListView = 'normal'; renderChatList(filter); };
    back.innerHTML = `← ${currentLang==='ru' ? 'Назад' : 'Back'}`;
    list.appendChild(back);

    const archivedIds = getArchivedChats();
    const archivedChats = chats.filter(c => archivedIds.includes(c.id) && c.name.toLowerCase().includes(filter.toLowerCase()));
    if(archivedChats.length === 0){
      const empty = document.createElement('div');
      empty.style.cssText = 'padding:24px 18px; color:var(--text-secondary); font-size:13.5px; text-align:center;';
      empty.textContent = currentLang==='ru' ? 'Черновики пусты' : 'No drafts yet';
      list.appendChild(empty);
    } else {
      archivedChats.forEach(c => list.appendChild(buildChatItemEl(c)));
    }
    return;
  }

  const archivedIds = getArchivedChats();
  const pinnedIds = getPinnedChats();
  const visibleChats = chats.filter(c => !archivedIds.includes(c.id));

  if(archivedIds.length > 0 && !filter){
    const row = document.createElement('div');
    row.className = 'archive-row';
    row.onclick = () => { chatListView = 'archived'; renderChatList(''); };
    row.innerHTML = `
      <div class="avatar">📥</div>
      <div class="chat-info">
        <div class="chat-row1"><span class="chat-name">${currentLang==='ru' ? 'Черновики' : 'Drafts'}</span></div>
        <div class="chat-row2"><span class="chat-preview">${archivedIds.length} ${currentLang==='ru' ? 'чат(а/ов)' : 'chat(s)'}</span></div>
      </div>`;
    list.appendChild(row);
  }

  visibleChats
    .filter(c => c.name.toLowerCase().includes(filter.toLowerCase()))
    .sort((a,b) => (pinnedIds.includes(b.id)?1:0) - (pinnedIds.includes(a.id)?1:0))
    .forEach(c => list.appendChild(buildChatItemEl(c)));
}

// строит DOM-элемент чата в списке и вешает обработчики клика / долгого нажатия
function buildChatItemEl(c){
  const div = document.createElement('div');
  div.className = 'chat-item' + (c.id === activeChatId ? ' active' : '');
  const pinned = isChatPinned(c.id);
  const av = chatAvatarStyleAndContent(c);
  div.innerHTML = `
    <div class="avatar ${c.avatarClass}" style="${av.style}">${av.content}${onlineDotHTML(c)}</div>
    <div class="chat-info">
      <div class="chat-row1">
        <span class="chat-name">${pinned ? '<span class="pinned-icon">📌</span>' : ''}${c.isGroup ? '👥 ' : ''}${nameWithPremiumBadge(c.name, !!(c.real && c.partnerIsPremium))}</span>
        <span class="chat-time">${isChatMuted(c.id) ? '<span class="mute-icon">🔕</span>' : ''}${c.time}</span>
      </div>
      <div class="chat-row2">
        <span class="chat-preview">${c.preview}</span>
        ${c.unread ? `<span class="badge">${c.unread}</span>` : ''}
      </div>
    </div>`;

  let lpTimer = null, lpFired = false;
  const clearLp = () => { clearTimeout(lpTimer); div.classList.remove('long-pressing'); };
  const startLp = (clientX, clientY) => {
    lpFired = false;
    div.classList.add('long-pressing');
    lpTimer = setTimeout(() => {
      lpFired = true;
      div.classList.remove('long-pressing');
      if(navigator.vibrate) navigator.vibrate(25);
      openChatContextMenu(c.id, clientX, clientY);
    }, 480);
  };

  div.addEventListener('mousedown', (e) => { if(e.button === 0) startLp(e.clientX, e.clientY); });
  div.addEventListener('mouseup', clearLp);
  div.addEventListener('mouseleave', clearLp);
  div.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    startLp(t.clientX, t.clientY);
  }, {passive:true});
  div.addEventListener('touchend', clearLp);
  div.addEventListener('touchmove', clearLp);
  div.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    openChatContextMenu(c.id, e.clientX, e.clientY);
  });
  div.addEventListener('click', (e) => {
    if(lpFired){ lpFired = false; e.stopPropagation(); e.preventDefault(); return; }
    openChat(c.id);
  });

  return div;
}

function renderMessages(chat){
  const box = document.getElementById('messagesBox');
  box.innerHTML = chat.messages.map((m, idx) => {
    let tick = '';
    if(m.out){
      const status = m.status || 'sent';
      if(status === 'sent') tick = '<span class="msg-tick">✓</span>';
      else if(status === 'delivered') tick = '<span class="msg-tick">✓✓</span>';
      else tick = '<span class="msg-tick read">✓✓</span>';
    }
    const isImage = m.file && m.file.type && m.file.type.startsWith('image/');
    const isVoice = !!m.voice;
    const isCall = !!m.call;
    const uid = chat.id + '_' + idx;
    const content = isCall ? renderCallContent(m.call, m.out) : (isVoice ? renderVoiceContent(m.voice, uid) : (m.file ? renderFileContent(m.file, m.text) : (m.text || '')));
    return `<div class="msg-row ${m.out ? 'out':'in'}">
      <div class="bubble ${isImage ? 'bubble-media' : ''} ${isVoice ? 'bubble-voice' : ''}">${content}<span class="time">${m.time}</span>${tick}</div>
    </div>`;
  }).join('');
  box.scrollTop = box.scrollHeight;
  attachVoicePlayerHandlers();
}

// отрисовка плеера голосового сообщения (кнопка play/pause + "волна" + длительность)
function renderVoiceContent(voice, uid){
  const durationText = formatDuration(voice.duration || 0);
  const barsCount = 27;
  let seed = 0;
  for(let s=0; s<String(uid).length; s++) seed += String(uid).charCodeAt(s);
  let bars = '';
  for(let i=0;i<barsCount;i++){
    const h = 4 + Math.abs(Math.sin(seed + i*12.9898)) * 16;
    bars += `<span class="voice-bar" style="height:${h.toFixed(1)}px"></span>`;
  }
  return `
    <div class="voice-msg" data-uid="${uid}">
      <audio class="voice-audio" id="audio-${uid}" src="${voice.dataUrl}" preload="metadata"></audio>
      <button class="voice-play-btn" id="playBtn-${uid}" onclick="toggleVoicePlay('${uid}')">▶</button>
      <div class="voice-wave" id="wave-${uid}" onclick="seekVoice(event,'${uid}')">${bars}</div>
      <span class="voice-duration" id="dur-${uid}">${durationText}</span>
    </div>`;
}
function formatDuration(sec){
  sec = Math.max(0, Math.round(sec || 0));
  const m = Math.floor(sec/60);
  const s = sec%60;
  return m + ':' + String(s).padStart(2,'0');
}
// текущее воспроизводимое голосовое сообщение (чтобы одновременно играло только одно)
let currentPlayingVoiceAudio = null;
function toggleVoicePlay(uid){
  const audio = document.getElementById('audio-'+uid);
  const btn = document.getElementById('playBtn-'+uid);
  if(!audio || !btn) return;
  if(currentPlayingVoiceAudio && currentPlayingVoiceAudio !== audio && !currentPlayingVoiceAudio.paused){
    currentPlayingVoiceAudio.pause();
  }
  if(audio.paused){
    audio.play().catch(()=>{});
    btn.textContent = '⏸';
    currentPlayingVoiceAudio = audio;
  } else {
    audio.pause();
    btn.textContent = '▶';
  }
}
// клик по "волне" — перемотка
function seekVoice(e, uid){
  const audio = document.getElementById('audio-'+uid);
  const wave = document.getElementById('wave-'+uid);
  if(!audio || !wave || !audio.duration || isNaN(audio.duration)) return;
  const rect = wave.getBoundingClientRect();
  const frac = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
  audio.currentTime = frac * audio.duration;
}
// привязываем обработчики прогресса/окончания ко всем аудио-плеерам после перерисовки сообщений
function attachVoicePlayerHandlers(){
  document.querySelectorAll('.voice-audio').forEach(audio=>{
    const uid = audio.id.replace('audio-','');
    audio.ontimeupdate = () => {
      if(!audio.duration || isNaN(audio.duration)) return;
      const frac = audio.currentTime / audio.duration;
      const wave = document.getElementById('wave-'+uid);
      const durEl = document.getElementById('dur-'+uid);
      if(wave){
        const bars = wave.querySelectorAll('.voice-bar');
        const playedCount = Math.floor(frac * bars.length);
        bars.forEach((b,i)=> b.classList.toggle('played', i < playedCount));
      }
      if(durEl) durEl.textContent = formatDuration(audio.duration - audio.currentTime);
    };
    audio.onended = () => {
      const btn = document.getElementById('playBtn-'+uid);
      const wave = document.getElementById('wave-'+uid);
      const durEl = document.getElementById('dur-'+uid);
      if(btn) btn.textContent = '▶';
      if(wave) wave.querySelectorAll('.voice-bar').forEach(b=>b.classList.remove('played'));
      if(durEl) durEl.textContent = formatDuration(audio.duration || 0);
      if(currentPlayingVoiceAudio === audio) currentPlayingVoiceAudio = null;
    };
  });
}

// отрисовка вложения (фото — превью, любой другой файл — карточка со скачиванием)
function renderFileContent(file, caption){
  const safeName = escapeHtml(file.name || 'file');
  if(file.type && file.type.startsWith('image/')){
    return `<a href="${file.dataUrl}" download="${safeName}" target="_blank" rel="noopener">
        <img src="${file.dataUrl}" alt="${safeName}" style="max-width:260px;max-height:320px;border-radius:10px;display:block;">
      </a>${caption ? `<div style="margin-top:4px;">${escapeHtml(caption)}</div>` : ''}`;
  }
  return `<a class="file-card" href="${file.dataUrl}" download="${safeName}" title="${t('fileDownload')}">
      <div class="file-icon">📄</div>
      <div class="file-meta">
        <div class="file-name">${safeName}</div>
        <div class="file-size">${formatFileSize(file.size)}</div>
      </div>
      <div class="file-download-ic">⬇️</div>
    </a>${caption ? `<div style="margin-top:4px;">${escapeHtml(caption)}</div>` : ''}`;
}
function formatFileSize(bytes){
  if(bytes === undefined || bytes === null) return '';
  if(bytes < 1024) return bytes + ' B';
  if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

/* ---------------- ОТПРАВКА ФАЙЛОВ ---------------- */
const MAX_FILE_SIZE = 20 * 1024 * 1024; // 20 МБ — ограничение демо-режима (для облака Firestore лимит документа ~1МБ)
function handleFileSelected(event){
  const files = Array.from(event.target.files || []);
  event.target.value = ''; // сбрасываем, чтобы можно было выбрать тот же файл повторно
  const chat = chats.find(c=>c.id===activeChatId);
  if(!chat || !files.length) return;
  files.forEach(file => sendFileMessage(chat, file));
}
function sendFileMessage(chat, file){
  if(file.size > MAX_FILE_SIZE){ showToast(t('fileTooLarge')); return; }
  const reader = new FileReader();
  reader.onload = () => {
    const fileObj = { name:file.name, size:file.size, type:file.type, dataUrl: reader.result };
    if(chat.real){
      sendDirectFileMessage(chat, fileObj);
      return;
    }
    const time = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
    const msg = { out:true, time, status:'sent', file:fileObj };
    chat.messages.push(msg);
    chat.preview = fileObj.type.startsWith('image/') ? '🖼 ' + t('photoCaption') : '📎 ' + fileObj.name;
    chat.time = time;
    if(activeChatId===chat.id) renderMessages(chat);
    renderChatList(document.getElementById('searchInput').value);
    scheduleSaveChats();
    setTimeout(()=>{
      msg.status = 'delivered';
      if(activeChatId===chat.id) renderMessages(chat);
      scheduleSaveChats();
    }, 400);
    scheduleBotReply(chat.id);
  };
  reader.onerror = () => showToast(currentLang==='ru' ? 'Не удалось прочитать файл' : 'Failed to read the file');
  reader.readAsDataURL(file);
}

// отправка файла настоящему собеседнику — пишем прямо в общий документ чата в Firestore
async function sendDirectFileMessage(chat, fileObj){
  if(!cloudReady){ showToast('Личные сообщения работают только с подключённой базой данных'); return; }
  const time = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  const preview = fileObj.type.startsWith('image/') ? '🖼 ' + t('photoCaption') : '📎 ' + fileObj.name;
  const msgObj = { senderId: currentAccId, senderName: currentUserName, file: fileObj, text:'', time, ts: Date.now() };
  try{
    await db.collection('directChats').doc(chat.directId).update({
      messages: firebase.firestore.FieldValue.arrayUnion(msgObj),
      lastMessage: preview,
      lastTime: time
    });
  }catch(e){
    console.error(e);
    showToast(currentLang==='ru' ? 'Не удалось отправить файл — возможно, он слишком большой' : 'Failed to send the file — it might be too large');

}
/* ---------------- ГОЛОСОВЫЕ СООБЩЕНИЯ (ЗАПИСЬ) ---------------- */
let mediaRecorder = null;
let recordedChunks = [];
let recordingSeconds = 0;
let recordingTimerInterval = null;
let recordingCancelled = false;
const MAX_RECORDING_SECONDS = 300; // ограничение демо — 5 минут

// переключаем иконку/поведение кнопки композера: отправить текст / начать запись / остановить запись
function setActionButtonMode(mode){
  const btn = document.getElementById('actionBtn');
  if(!btn) return;
  btn.dataset.mode = mode;
  btn.classList.toggle('recording-active', mode === 'recording');
  if(mode === 'send'){
    btn.title = currentLang==='ru' ? 'Отправить' : 'Send';
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 12L20 4L13 20L11 13L4 12Z" fill="white"/></svg>';
  } else if(mode === 'recording'){
    btn.title = t('stopAndSend');
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="6" y="6" width="12" height="12" rx="2" fill="white"/></svg>';
  } else {
    btn.title = t('recordVoice');
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3z" stroke="white" stroke-width="1.6"/><path d="M19 11a7 7 0 0 1-14 0" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="12" y1="18" x2="12" y2="22" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg>';
  }
}
// вызывается при вводе текста — не переключаем режим, пока идёт запись
function updateActionBtn(){
  const input = document.getElementById('msgInput');
  if(!input) return;
  if(mediaRecorder && mediaRecorder.state === 'recording') return;
  setActionButtonMode(input.value.trim() ? 'send' : 'mic');
}
function handleActionBtn(){
  const btn = document.getElementById('actionBtn');
  const mode = btn ? btn.dataset.mode : 'mic';
  if(mode === 'send') sendMessage();
  else if(mode === 'recording') stopAndSendVoiceRecording();
  else startVoiceRecording();
}
function showRecordingUI(show){
  const input = document.getElementById('msgInput');
  const indicator = document.getElementById('recordingIndicator');
  const attachBtn = document.getElementById('attachBtn');
  const giftBtn = document.getElementById('giftBtn');
  if(input) input.style.display = show ? 'none' : '';
  if(indicator) indicator.style.display = show ? 'flex' : 'none';
  if(attachBtn) attachBtn.style.visibility = show ? 'hidden' : '';
  if(giftBtn) giftBtn.style.visibility = show ? 'hidden' : '';
}
function updateRecTimerDisplay(){
  const el = document.getElementById('recTimer');
  if(el) el.textContent = formatDuration(recordingSeconds);
}
async function startVoiceRecording(){
  if(!activeChatId) return;
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder === 'undefined'){
    showToast(t('micNotSupported'));
    return;
  }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    recordedChunks = [];
    recordingCancelled = false;
    let mimeType = '';
    if(window.MediaRecorder && MediaRecorder.isTypeSupported){
      if(MediaRecorder.isTypeSupported('audio/webm')) mimeType = 'audio/webm';
      else if(MediaRecorder.isTypeSupported('audio/mp4')) mimeType = 'audio/mp4';
    }
    mediaRecorder = mimeType ? new MediaRecorder(stream, {mimeType}) : new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if(e.data && e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(tr => tr.stop());
      clearInterval(recordingTimerInterval);
      if(!recordingCancelled) finalizeVoiceRecording();
      recordedChunks = [];
    };
    mediaRecorder.start();
    recordingSeconds = 0;
    updateRecTimerDisplay();
    recordingTimerInterval = setInterval(()=>{
      recordingSeconds++;
      updateRecTimerDisplay();
      if(recordingSeconds >= MAX_RECORDING_SECONDS) stopAndSendVoiceRecording();
    }, 1000);
    showRecordingUI(true);
    setActionButtonMode('recording');
  }catch(err){
    console.error(err);
    showToast(t('micDenied'));
  }
}
function stopAndSendVoiceRecording(){
  if(!mediaRecorder || mediaRecorder.state === 'inactive') return;
  recordingCancelled = false;
  mediaRecorder.stop();
}
function cancelVoiceRecording(){
  if(!mediaRecorder || mediaRecorder.state === 'inactive'){
    showRecordingUI(false);
    updateActionBtn();
    return;
  }
  recordingCancelled = true;
  mediaRecorder.stop();
  showRecordingUI(false);
  updateActionBtn();
}
function finalizeVoiceRecording(){
  const duration = recordingSeconds;
  const mimeType = (mediaRecorder && mediaRecorder.mimeType) || 'audio/webm';
  const blob = new Blob(recordedChunks, {type: mimeType});
  showRecordingUI(false);
  updateActionBtn();
  if(duration < 1 || blob.size === 0) return; // слишком короткая запись — игнорируем
  if(blob.size > MAX_FILE_SIZE){ showToast(t('fileTooLarge')); return; }
  const reader = new FileReader();
  reader.onload = () => {
    const chat = chats.find(c=>c.id===activeChatId);
    if(!chat) return;
    const voiceObj = { dataUrl: reader.result, duration, size: blob.size, mimeType };
    sendVoiceMessage(chat, voiceObj);
  };
  reader.onerror = () => showToast(t('voiceProcessFailed'));
  reader.readAsDataURL(blob);
}

/* ---------------- ОТПРАВКА ГОЛОСОВЫХ СООБЩЕНИЙ ---------------- */
function sendVoiceMessage(chat, voiceObj){
  if(chat.real){
    sendDirectVoiceMessage(chat, voiceObj);
    return;
  }
  const time = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  const msg = { out:true, time, status:'sent', voice: voiceObj };
  chat.messages.push(msg);
  chat.preview = '🎤 ' + t('voiceMessage');
  chat.time = time;
  if(activeChatId===chat.id) renderMessages(chat);
  renderChatList(document.getElementById('searchInput').value);
  scheduleSaveChats();
  setTimeout(()=>{
    msg.status = 'delivered';
    if(activeChatId===chat.id) renderMessages(chat);
    scheduleSaveChats();
  }, 400);
  scheduleBotReply(chat.id);
}

// отправка голосового сообщения настоящему собеседнику — так же, как файлы, через Firestore
async function sendDirectVoiceMessage(chat, voiceObj){

/* ---------------- ЗВОНКИ ---------------- */
// Настоящим собеседникам звоним через WebRTC (аудио), сигнализация — через документ в Firestore
// (коллекция 'calls', один документ на пару собеседников = directId их общего чата).
// Ботам-персонажам звонок симулируется локально (гудки -> "ответ" -> таймер разговора).
const RTC_CONFIG = { iceServers: [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' }
] };

let callState = null;           // null | 'outgoing' | 'incoming' | 'active'
let currentCallChat = null;     // объект чата, с которым сейчас звоним
let currentCallIsReal = false;  // true — настоящий WebRTC-звонок, false — симуляция с ботом
let currentCallDocId = null;    // id документа в коллекции 'calls' (для настоящих звонков)
let callIAmCaller = false;      // это я инициировал звонок? (нужно, чтобы только одна сторона логировала итог в историю)
let callSeconds = 0;
let callMuted = false;
let callSpeakerOn = true;
let localCallStream = null;
let remoteCallPeerConnection = null;
let callTimerInterval = null;
let callRingTimeout = null;
let botCallTimeout = null;
let unsubscribeCallDoc = null;
let unsubscribeIncomingCalls = null;
let addedCallerCandidatesCount = 0;
let addedCalleeCandidatesCount = 0;
let pendingIncomingCall = null;
let ringtoneInterval = null;

function startCall(chatId){
  const chat = chats.find(c=>c.id===chatId);
  if(!chat) return;
  if(callState){ showToast(currentLang==='ru' ? 'Звонок уже выполняется' : 'A call is already in progress'); return; }
  if(!chat.real && !chat.persona){
    showToast(currentLang==='ru' ? 'В этот чат нельзя позвонить' : 'You cannot call this chat');
    return;
  }
  if(chat.real) startRealCall(chat);
  else startBotCall(chat);
}

/* ---- симуляция звонка боту (демо-чаты без реального собеседника) ---- */
function startBotCall(chat){
  currentCallChat = chat;
  currentCallIsReal = false;
  callIAmCaller = true;
  callState = 'outgoing';
  callSeconds = 0;
  showCallOverlay();
  renderCallUI();
  botCallTimeout = setTimeout(()=>{
    if(callState !== 'outgoing') return;
    callState = 'active';
    renderCallUI();
    startCallTimer();
  }, 1200 + Math.random()*1200);
}

/* ---- настоящий звонок собеседнику через WebRTC + Firestore-сигнализацию ---- */
async function startRealCall(chat){
  if(!cloudReady){ showToast(currentLang==='ru' ? 'Звонки работают только с подключённой базой данных' : 'Calls require a connected database'); return; }
  try{
    localCallStream = await navigator.mediaDevices.getUserMedia({audio:true});
  }catch(err){
    console.error(err);
    showToast(t('micDenied'));
    return;
  }
  currentCallChat = chat;
  currentCallIsReal = true;
  currentCallDocId = chat.directId;
  callIAmCaller = true;
  callState = 'outgoing';
  callSeconds = 0;
  callMuted = false;
  addedCallerCandidatesCount = 0;
  addedCalleeCandidatesCount = 0;
  showCallOverlay();
  renderCallUI();

  const pc = new RTCPeerConnection(RTC_CONFIG);
  remoteCallPeerConnection = pc;
  localCallStream.getTracks().forEach(track => pc.addTrack(track, localCallStream));
  const remoteStream = new MediaStream();
  const remoteAudioEl = document.getElementById('remoteCallAudio');
  if(remoteAudioEl) remoteAudioEl.srcObject = remoteStream;
  pc.ontrack = e => { e.streams[0].getTracks().forEach(tr => remoteStream.addTrack(tr)); };

  const callRef = db.collection('calls').doc(chat.directId);
  pc.onicecandidate = e => {
    if(e.candidate){
      callRef.set({ callerCandidates: firebase.firestore.FieldValue.arrayUnion(e.candidate.toJSON()) }, {merge:true}).catch(()=>{});
    }
  };

  try{
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await callRef.set({
      callerId: currentAccId,
      callerName: currentUserName,
      calleeId: chat.partnerId,
      status: 'ringing',
      offer: { type: offer.type, sdp: offer.sdp },
      answer: null,
      callerCandidates: [],
      calleeCandidates: [],
      startedAt: Date.now()
    });
  }catch(err){
    console.error(err);
    showToast(currentLang==='ru' ? 'Не удалось начать звонок' : 'Failed to start the call');
    cleanupCallResources(); hideCallOverlay(); resetCallState();
    return;
  }

  unsubscribeCallDoc = callRef.onSnapshot(snap => {
    const data = snap.data();
    if(!data) return;
    if(data.status === 'accepted' && data.answer && pc.currentRemoteDescription === null){
      pc.setRemoteDescription(new RTCSessionDescription(data.answer)).then(()=>{
        clearTimeout(callRingTimeout);
        callState = 'active';
        renderCallUI();
        startCallTimer();
      }).catch(err=>console.error(err));
    }
    if(data.calleeCandidates && data.calleeCandidates.length > addedCalleeCandidatesCount){
      const newOnes = data.calleeCandidates.slice(addedCalleeCandidatesCount);
      addedCalleeCandidatesCount = data.calleeCandidates.length;
      newOnes.forEach(c => pc.addIceCandidate(new RTCIceCandidate(c)).catch(()=>{}));
    }
    if(data.status === 'declined') handleRemoteEndedCall('declined');
    else if(data.status === 'ended') handleRemoteEndedCall('completed');
    else if(data.status === 'missed') handleRemoteEndedCall('missed');
  }, err => console.warn('Ошибка сигнализации звонка:', err));

  // если за 30 секунд не ответили — считаем звонок пропущенным
  callRingTimeout = setTimeout(()=>{
    if(callState === 'outgoing'){
      callRef.set({status:'missed', endedAt: Date.now()}, {merge:true}).catch(()=>{});
      finishLocalCall('missed');
    }
  }, 30000);
}

/* ---- глобальное прослушивание входящих звонков (запускается сразу после входа в аккаунт) ---- */
function watchIncomingCalls(accIdVal){
  if(!cloudReady) return;
  if(unsubscribeIncomingCalls) unsubscribeIncomingCalls();
  unsubscribeIncomingCalls = db.collection('calls')
    .where('calleeId', '==', accIdVal)
    .onSnapshot(snap => {
      snap.docChanges().forEach(change => {
        const data = change.doc.data();
        if(!data) return;
        if(data.status === 'ringing' && !callState){
          if(Date.now() - (data.startedAt || 0) > 45000) return; // зависшая старая запись — игнорируем
          showIncomingCall(change.doc.id, data);
        } else if(callState === 'incoming' && currentCallDocId === change.doc.id &&
                  data.status !== 'ringing' && data.status !== 'accepted'){
          // звонящий отменил или пропустил звонок, пока мы ещё не ответили
          handleRemoteEndedCall(data.status);
        }
      });
    }, err => console.warn('Ошибка отслеживания входящих звонков:', err));
}

function showIncomingCall(docId, data){
  if(callState) return;
  const chat = directChats.find(c => c.partnerId === data.callerId) || {
    id: 'direct_call_' + docId, directId: docId, real:true, partnerId: data.callerId,
    name: data.callerName || (currentLang==='ru' ? 'Пользователь' : 'User'),
    avatarClass: 'g'+((simpleHash(data.callerId)%5)+1),
    avatarText: (data.callerName || '?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()
  };
  currentCallChat = chat;
  currentCallIsReal = true;
  currentCallDocId = docId;
  callIAmCaller = false;
  callState = 'incoming';
  pendingIncomingCall = { docId, callerId: data.callerId, callerName: data.callerName, offer: data.offer };
  startRingtone();
  showCallOverlay();
  renderCallUI();
}

async function acceptIncomingCall(){
  if(callState !== 'incoming' || !pendingIncomingCall) return;
  const info = pendingIncomingCall;
  stopRingtone();
  try{
    localCallStream = await navigator.mediaDevices.getUserMedia({audio:true});
  }catch(err){
    console.error(err);
    showToast(t('micDenied'));
    db.collection('calls').doc(info.docId).set({status:'declined', endedAt: Date.now()}, {merge:true}).catch(()=>{});
    hideCallOverlay();
    resetCallState();
    return;
  }
  addedCallerCandidatesCount = 0;

  const pc = new RTCPeerConnection(RTC_CONFIG);
  remoteCallPeerConnection = pc;
  localCallStream.getTracks().forEach(track => pc.addTrack(track, localCallStream));
  const remoteStream = new MediaStream();
  const remoteAudioEl = document.getElementById('remoteCallAudio');
  if(remoteAudioEl) remoteAudioEl.srcObject = remoteStream;
  pc.ontrack = e => { e.streams[0].getTracks().forEach(tr => remoteStream.addTrack(tr)); };

  const callRef = db.collection('calls').doc(info.docId);
  pc.onicecandidate = e => {
    if(e.candidate){
      callRef.set({ calleeCandidates: firebase.firestore.FieldValue.arrayUnion(e.candidate.toJSON()) }, {merge:true}).catch(()=>{});
    }
  };

  try{
    await pc.setRemoteDescription(new RTCSessionDescription(info.offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await callRef.set({ status:'accepted', answer:{type:answer.type, sdp:answer.sdp}, connectedAt: Date.now() }, {merge:true});
  }catch(err){
    console.error(err);
    showToast(currentLang==='ru' ? 'Не удалось принять звонок' : 'Failed to accept the call');
    cleanupCallResources(); hideCallOverlay(); resetCallState();
    return;
  }

  unsubscribeCallDoc = callRef.onSnapshot(snap => {
    const d = snap.data();
    if(!d) return;
    if(d.callerCandidates && d.callerCandidates.length > addedCallerCandidatesCount){
      const newOnes = d.callerCandidates.slice(addedCallerCandidatesCount);
      addedCallerCandidatesCount = d.callerCandidates.length;
      newOnes.forEach(c => pc.addIceCandidate(new RTCIceCandidate(c)).catch(()=>{}));
    }
    if(d.status === 'cancelled') handleRemoteEndedCall('cancelled');
    else if(d.status === 'ended') handleRemoteEndedCall('completed');
  }, err => console.warn('Ошибка сигнализации звонка:', err));

  callState = 'active';
  renderCallUI();
  startCallTimer();
}

/* ---- общие функции управления звонком ---- */
function showCallOverlay(){
  const el = document.getElementById('callOverlay');
  if(el) el.style.display = 'flex';
}
function hideCallOverlay(){
  const el = document.getElementById('callOverlay');
  if(el) el.style.display = 'none';
  stopRingtone();
}
function renderCallUI(){
  const chat = currentCallChat;
  const overlay = document.getElementById('callOverlay');
  const avatarEl = document.getElementById('callAvatar');
  const nameEl = document.getElementById('callName');
  const statusEl = document.getElementById('callStatus');
  const controlsEl = document.getElementById('callControls');
  if(!chat || !overlay || !avatarEl || !nameEl || !statusEl || !controlsEl) return;

  const av = chatAvatarStyleAndContent(chat);
  avatarEl.className = 'call-avatar ' + (chat.avatarClass || '');
  avatarEl.style.cssText = av.style || '';
  avatarEl.innerHTML = av.content || '';
  nameEl.textContent = chat.name;
  overlay.classList.toggle('call-ringing-mode', callState === 'outgoing' || callState === 'incoming');

  if(callState === 'outgoing'){
    statusEl.textContent = currentLang==='ru' ? 'Вызов...' : 'Calling...';
    controlsEl.innerHTML = `
      <button class="call-btn call-btn-danger" onclick="hangupCall()" title="${currentLang==='ru'?'Отменить':'Cancel'}">📵</button>`;
  } else if(callState === 'incoming'){
    statusEl.textContent = currentLang==='ru' ? 'Входящий звонок...' : 'Incoming call...';
    controlsEl.innerHTML = `
      <button class="call-btn call-btn-danger" onclick="hangupCall()" title="${currentLang==='ru'?'Отклонить':'Decline'}">📵</button>
      <button class="call-btn call-btn-success" onclick="acceptIncomingCall()" title="${currentLang==='ru'?'Принять':'Accept'}">📞</button>`;
  } else if(callState === 'active'){
    statusEl.textContent = formatDuration(callSeconds);
    const muteTitle = currentLang==='ru' ? 'Микрофон' : 'Mute';
    const speakerTitle = currentLang==='ru' ? 'Динамик' : 'Speaker';
    const endTitle = currentLang==='ru' ? 'Завершить' : 'End call';
    controlsEl.innerHTML = `
      <button class="call-btn ${callMuted ? 'call-btn-active' : ''}" onclick="toggleCallMute()" title="${muteTitle}">${callMuted ? '🔇' : '🎙️'}</button>
      <button class="call-btn call-btn-danger" onclick="hangupCall()" title="${endTitle}">📵</button>
      <button class="call-btn ${callSpeakerOn ? 'call-btn-active' : ''}" onclick="toggleCallSpeaker()" title="${speakerTitle}">${callSpeakerOn ? '🔊' : '🔈'}</button>`;
  }
}
function startCallTimer(){
  clearInterval(callTimerInterval);
  callTimerInterval = setInterval(()=>{
    callSeconds++;
    const statusEl = document.getElementById('callStatus');
    if(statusEl && callState === 'active') statusEl.textContent = formatDuration(callSeconds);
  }, 1000);
}
function toggleCallMute(){
  callMuted = !callMuted;
  if(localCallStream) localCallStream.getAudioTracks().forEach(tr => tr.enabled = !callMuted);
  renderCallUI();
}
function toggleCallSpeaker(){
  callSpeakerOn = !callSpeakerOn;
  const audioEl = document.getElementById('remoteCallAudio');
  if(audioEl) audioEl.volume = callSpeakerOn ? 1 : 0.25; // упрощённая имитация переключения динамика/наушника
  renderCallUI();
}

// нажатие единственной "трубки" — значение зависит от текущей стадии звонка
function hangupCall(){
  if(!callState) return;
  const wasActive = callState === 'active';
  const wasIncoming = callState === 'incoming';
  const localStatus = wasActive ? 'completed' : (wasIncoming ? 'declined' : 'cancelled');

  if(currentCallIsReal && currentCallDocId){
    const fireStatus = wasActive ? 'ended' : (wasIncoming ? 'declined' : 'cancelled');
    db.collection('calls').doc(currentCallDocId).set({status: fireStatus, endedAt: Date.now()}, {merge:true}).catch(()=>{});
  }
  finishLocalCall(localStatus);
}
// вызывается, когда об окончании звонка сообщил документ Firestore (собеседник положил трубку/отклонил/не ответил)
function handleRemoteEndedCall(status){
  if(!callState) return;
  finishLocalCall(status);
}
function finishLocalCall(status){
  const duration = callState === 'active' ? callSeconds : 0;
  const chat = currentCallChat;
  const shouldLog = callIAmCaller && !!chat;
  cleanupCallResources();
  hideCallOverlay();
  if(shouldLog) logCallMessage(chat, duration, status);
  resetCallState();
}
function cleanupCallResources(){
  clearTimeout(callRingTimeout);
  clearTimeout(botCallTimeout);
  clearInterval(callTimerInterval);
  stopRingtone();
  if(unsubscribeCallDoc){ unsubscribeCallDoc(); unsubscribeCallDoc = null; }
  if(remoteCallPeerConnection){ try{ remoteCallPeerConnection.close(); }catch(e){} remoteCallPeerConnection = null; }
  if(localCallStream){ localCallStream.getTracks().forEach(tr=>tr.stop()); localCallStream = null; }
  const audioEl = document.getElementById('remoteCallAudio');
  if(audioEl) audioEl.srcObject = null;
}
function resetCallState(){
  callState = null;
  currentCallChat = null;
  currentCallIsReal = false;
  currentCallDocId = null;
  callIAmCaller = false;
  callSeconds = 0;
  callMuted = false;
  pendingIncomingCall = null;
  addedCallerCandidatesCount = 0;
  addedCalleeCandidatesCount = 0;
}

// простая мелодия входящего звонка через Web Audio API (без внешних файлов)
function startRingtone(){
  stopRingtone();
  const playBeep = () => {
    try{
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(!Ctx) return;
      const ctx = window._notifAudioCtx || (window._notifAudioCtx = new Ctx());
      if(ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;
      [740, 660].forEach((freq, i)=>{
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now + i*0.28);
        gain.gain.setValueAtTime(0.0001, now + i*0.28);
        gain.gain.exponentialRampToValueAtTime(0.2, now + i*0.28 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + i*0.28 + 0.24);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now + i*0.28);
        osc.stop(now + i*0.28 + 0.26);
      });
    }catch(e){}
  };
  playBeep();
  ringtoneInterval = setInterval(playBeep, 1600);
}
function stopRingtone(){
  clearInterval(ringtoneInterval);
  ringtoneInterval = null;
}

/* ---- запись звонка в историю переписки ---- */
function logCallMessage(chat, duration, status){
  const time = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  const callObj = { duration, status };
  const preview = callMessagePreviewText(callObj);
  if(chat.real){
    if(!cloudReady) return;
    const msgObj = { senderId: currentAccId, senderName: currentUserName, call: callObj, text:'', time, ts: Date.now() };
    db.collection('directChats').doc(chat.directId).update({
      messages: firebase.firestore.FieldValue.arrayUnion(msgObj),
      lastMessage: preview,
      lastTime: time
    }).catch(e=>console.error(e));
  } else {
    const localChat = localChats.find(c=>c.id===chat.id) || chat;
    localChat.messages.push({ out:true, time, call: callObj });
    localChat.preview = preview;
    localChat.time = time;
    if(activeChatId === localChat.id) renderMessages(localChat);
    renderChatList(document.getElementById('searchInput').value);
    scheduleSaveChats();
  }
}
function callMessagePreviewText(call){
  if(call.status === 'completed') return '📞 ' + (currentLang==='ru' ? 'Звонок' : 'Call') + ' ' + formatDuration(call.duration);
  if(call.status === 'missed') return '📵 ' + (currentLang==='ru' ? 'Пропущенный звонок' : 'Missed call');
  if(call.status === 'declined') return '📵 ' + (currentLang==='ru' ? 'Звонок отклонён' : 'Call declined');
  return '📵 ' + (currentLang==='ru' ? 'Звонок отменён' : 'Call cancelled');
}
// отрисовка системного сообщения о звонке внутри переписки
function renderCallContent(call, isOut){
  let icon = '📞', label;
  if(call.status === 'completed'){
    label = (isOut ? (currentLang==='ru' ? 'Исходящий звонок' : 'Outgoing call') : (currentLang==='ru' ? 'Входящий звонок' : 'Incoming call')) + ' · ' + formatDuration(call.duration);
  } else if(call.status === 'missed'){
    icon = '📵';
    label = isOut ? (currentLang==='ru' ? 'Не отвечено' : 'No answer') : (currentLang==='ru' ? 'Пропущенный звонок' : 'Missed call');
  } else if(call.status === 'declined'){
    icon = '📵';
    label = currentLang==='ru' ? 'Звонок отклонён' : 'Call declined';
  } else {
    icon = '📵';
    label = currentLang==='ru' ? 'Звонок отменён' : 'Call cancelled';
  }
  return `<div class="call-msg"><span class="call-msg-icon">${icon}</span><span class="call-msg-label">${label}</span></div>`;
}

function sendMessage(){
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text) return;
  const chat = chats.find(c=>c.id===activeChatId);
  if(!chat) return;
  input.value = '';
  updateActionBtn();

  if(chat.real){
    sendDirectMessage(chat, text);
    return;
  }

  const time = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  chat.messages.push({out:true, text, time, status:'sent'});
  chat.preview = text;
  chat.time = time;
  renderMessages(chat);
  renderChatList(document.getElementById('searchInput').value);
  scheduleSaveChats();
  setTimeout(()=>{
    const m = chat.messages[chat.messages.length-1];
    if(m && m.status==='sent'){ m.status='delivered'; if(activeChatId===chat.id) renderMessages(chat); scheduleSaveChats(); }
  }, 400);
  scheduleBotReply(chat.id);
}

// отправка сообщения настоящему человеку — пишем прямо в общий документ чата в Firestore
async function sendDirectMessage(chat, text){
  if(!cloudReady){ showToast('Личные сообщения работают только с подключённой базой данных'); return; }
  const time = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  const msgObj = { senderId: currentAccId, senderName: currentUserName, text, time, ts: Date.now() };
  try{
    await db.collection('directChats').doc(chat.directId).update({
      messages: firebase.firestore.FieldValue.arrayUnion(msgObj),
      lastMessage: text,
      lastTime: time
    });
  }catch(e){
    console.error(e);
    showToast('Не удалось отправить сообщение — проверьте подключение');
  }
}

function isChatMuted(id){ return getMutedChats().includes(id); }

}
function toggleChatMute(){
  const chat = chats.find(c=>c.id===activeChatId);
  if(!chat) return;
  let muted = getMutedChats();
  if(muted.includes(chat.id)) muted = muted.filter(id=>id!==chat.id);
  else muted.push(chat.id);
  setMutedChats(muted);
  toggleChatMoreMenu();
  renderChatList(document.getElementById('searchInput').value);
  showToast(isChatMuted(chat.id) ? t('chatMuted') : t('chatUnmuted'));
}
function confirmClearHistory(){
  toggleChatMoreMenu();
  const chat = chats.find(c=>c.id===activeChatId);
  if(!chat) return;
  if(!window.confirm(t('confirmClearHistory'))) return;
  chat.messages = [];
  chat.preview = '';
  renderMessages(chat);
  renderChatList(document.getElementById('searchInput').value);
  if(chat.real){
    if(cloudReady){
      db.collection('directChats').doc(chat.directId).update({ messages: [], lastMessage: '', lastTime: '' })
        .catch(e => console.warn('Не удалось очистить историю в облаке:', e));
    }
  } else {
    scheduleSaveChats();
  }
  showToast(t('historyCleared'));
}
function confirmDeleteChat(){
  toggleChatMoreMenu();
  const chat = chats.find(c=>c.id===activeChatId);
  if(!chat) return;
  if(!window.confirm(t('confirmDeleteChat'))) return;
  if(chat.real){
    if(cloudReady){
      db.collection('directChats').doc(chat.directId).delete()
        .catch(e => console.warn('Не удалось удалить чат в облаке:', e));
    }
  } else {
    localChats = localChats.filter(c=>c.id!==chat.id);
    scheduleSaveChats();
  }
  showEmptyChatState();
  mergeAndRenderChats();
  showToast(t('chatDeleted'));
}

let notificationsOn = true;
function toggleNotifications(itemEl){
  notificationsOn = !notificationsOn;
  const toggle = itemEl.querySelector('.notif-toggle');
  if(toggle) toggle.classList.toggle('on', notificationsOn);
  showToast(notificationsOn ? 'Уведомления включены 🔔' : 'Уведомления отключены 🔕');
}

function notImplemented(msg){
  showToast(msg || 'Эта функция ещё не реализована в демо-версии');
}

function showStorageInfo(){
  const sizeKb = Math.round((JSON.stringify(localChats).length + JSON.stringify(directChats).length) / 1024 * 10) / 10;
  showToast(`Используется примерно ${sizeKb} КБ данных чатов`);
}



/* ---------------- SIDE PANEL ---------------- */
let panelHistory = [];
let currentPanelType = null;

function closePanel(){
  editingProfile = false;
  if(panelHistory.length > 0){
    const prevType = panelHistory.pop();
    openPanel(prevType, true);
  } else {
    document.getElementById('sidePanel').style.display = 'none';
    currentPanelType = null;
    setActiveBottomNav('bnChats');
  }
}

/* ---------------- НИЖНЯЯ ПАНЕЛЬ (Чаты / Настройки) ---------------- */
function setActiveBottomNav(id){
  ['bnChats','bnSettings'].forEach(x=>{
    document.getElementById(x).classList.toggle('active', x===id);
  });
}
function bottomNavGo(tab){
  if(tab === 'chats'){
    panelHistory = [];
    currentPanelType = null;
    document.getElementById('sidePanel').style.display = 'none';
    setActiveBottomNav('bnChats');
  } else if(tab === 'settings'){
    panelHistory = [];

function openPanel(type, isRootOrBack){
  document.getElementById('dropMenu').style.display = 'none';
  const panel = document.getElementById('sidePanel');
  const wasOpen = panel.style.display === 'flex';
  if(!isRootOrBack && wasOpen && currentPanelType && currentPanelType !== type){
    panelHistory.push(currentPanelType);
  }
  panel.style.display = 'flex';
  currentPanelType = type;
  if(type === 'settings') panel.innerHTML = settingsHTML();
  if(type === 'premium') panel.innerHTML = premiumHTML();
  if(type === 'stars') panel.innerHTML = starsHTML();
  if(type === 'gifts') panel.innerHTML = giftsHTML();
  if(type === 'appearance') panel.innerHTML = appearanceHTML();
  if(type === 'language') panel.innerHTML = languageHTML();
}

function chatAvatarStyleAndContent(chat){

// сохраняем статус Premium в облаке (или локально, если Firebase не настроен)
async function persistPremiumStatus(){
  if(!currentAccId) return;
  if(cloudReady){
    try{
      await db.collection('accounts').doc(currentAccId).set(
        { isPremium: currentUserIsPremium, premiumGiftedBy: currentUserPremiumGiftedBy },
        { merge: true }
      );
    }catch(e){ console.warn('Не удалось сохранить статус Premium в облако:', e); }
  } else {
    const accounts = getLocalAccounts();
    if(!accounts[currentAccId]) accounts[currentAccId] = { name: currentUserName, pass:'', login: currentUserName };
    accounts[currentAccId].isPremium = currentUserIsPremium;
    accounts[currentAccId].premiumGiftedBy = currentUserPremiumGiftedBy;
    saveLocalAccounts(accounts);
  }
}

// поиск реального пользователя по номеру телефона / логину и создание (или открытие) общего чата с ним
async function handleAddByPhone(){
  const input = document.getElementById('phoneAddInput');
  const errEl = document.getElementById('phoneAddError');
  const btn = document.getElementById('phoneAddBtn');
  const value = input.value.trim();
  errEl.classList.remove('show');
  if(!value){ showAuthErr('phoneAddError','Введите номер телефона или логин'); return; }
  if(!cloudReady){ showAuthErr('phoneAddError','Личные сообщения работают только с подключённой базой данных'); return; }

  const targetAccId = accId(value);
  if(targetAccId === currentAccId){ showAuthErr('phoneAddError','Это ваш собственный номер 🙂'); return; }

  btn.disabled = true; btn.textContent = 'Ищем...';
  try{
    const target = await findAccount(value);
    if(!target){ showAuthErr('phoneAddError','Пользователь с таким номером/логином не найден'); return; }

    const chatDocId = [currentAccId, targetAccId].sort().join('__');
    const ref = db.collection('directChats').doc(chatDocId);
    const snap = await ref.get();
    if(!snap.exists){
      await ref.set({
        participants: [currentAccId, targetAccId],
        participantNames: { [currentAccId]: currentUserName, [targetAccId]: target.name },
        messages: [],
        lastMessage: '',
        lastTime: '',
        createdAt: Date.now()
      });
    }
    closeModal();
    openChat('direct_' + chatDocId);
    showToast(`Чат с ${target.name} открыт`);
  }catch(e){
    console.error(e);
    showAuthErr('phoneAddError','Ошибка сети. Проверьте подключение к базе данных.');
  }finally{
    btn.disabled = false; btn.textContent = 'Найти и написать';
  }
}
function sendGiftTo(name){
  const gift = giftItems[pendingGiftIndex];
  if(starBalance < gift.price){ showToast('Недостаточно звёзд ⭐'); closeModal(); return; }
  starBalance -= gift.price;
  scheduleSaveChats();
  closeModal();
  showToast(`Подарок «${gift.name}» отправлен ${name} 🎉`);
}

// дарим Chats Premium настоящему пользователю (ищем по номеру телефона / логину)
async function handleGiftPremium(){
  const input = document.getElementById('giftPremiumInput');
  const errEl = document.getElementById('giftPremiumError');
  const btn = document.getElementById('giftPremiumBtn');
  const value = input.value.trim();
  errEl.classList.remove('show');
  if(!value){ showAuthErr('giftPremiumError', t('enterPhoneOrLogin')); return; }
  if(!cloudReady){ showAuthErr('giftPremiumError', t('cloudRequired')); return; }

  const targetAccId = accId(value);
  if(targetAccId === currentAccId){ showAuthErr('giftPremiumError', t('cannotGiftSelf')); return; }

  btn.disabled = true; btn.textContent = t('searching');
  try{
    const target = await findAccount(value);
    if(!target){ showAuthErr('giftPremiumError', t('userNotFound')); return; }
    if(target.isPremium){ showAuthErr('giftPremiumError', t('alreadyPremium')); return; }

    // отмечаем получателя как Premium и запоминаем, кто подарил
    await db.collection('accounts').doc(targetAccId).set(
      { isPremium: true, premiumGiftedBy: currentUserName },
      { merge: true }
    );

    // отправляем уведомление прямо в общий чат с получателем, чтобы он сразу увидел, кто подарил
    const chatDocId = [currentAccId, targetAccId].sort().join('__');
    const ref = db.collection('directChats').doc(chatDocId);
    const time = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
    const giftMsg = {
      senderId: currentAccId,
      senderName: currentUserName,
      text: `🎁 ${t('giftPremiumSystemMsg')} ${currentUserName}!`,
      time,
      ts: Date.now()
    };
    const snap = await ref.get();
    if(!snap.exists){
      await ref.set({
        participants: [currentAccId, targetAccId],
        participantNames: { [currentAccId]: currentUserName, [targetAccId]: target.name },
        messages: [giftMsg],
        lastMessage: giftMsg.text,
        lastTime: time,
        createdAt: Date.now()
      });
    } else {
      await ref.update({
        messages: firebase.firestore.FieldValue.arrayUnion(giftMsg),
        lastMessage: giftMsg.text,
        lastTime: time
      });
    }

    closeModal();
    showToast(`${t('giftPremiumSuccess')} ${target.name} 🎉`);
  }catch(e){
    console.error(e);
    showAuthErr('giftPremiumError', t('networkError'));
  }finally{
    btn.disabled = false; btn.textContent = t('giftPremiumSend');
  }
}

let selectedGroupMembers = []; // имена выбранных контактов для новой группы

function renderGroupContacts(filter){
  const box = document.getElementById('groupContactsBox');
  if(!box) return;
  const pool = getContactsPool();
  if(pool.length === 0){
    box.innerHTML = `<div style="padding:18px; color:var(--text-secondary); font-size:13.5px; text-align:center;">${currentLang==='ru' ? 'Пока нет ни одного собеседника, чтобы добавить в группу.' : 'No contacts yet to add to a group.'}</div>`;
    return;
  }
  box.innerHTML = pool
    .filter(c=>c.name.toLowerCase().includes((filter||'').toLowerCase()))
    .map((c,i)=>{
      const selected = selectedGroupMembers.includes(c.name);
      return `
      <div class="contact-row selectable ${selected ? 'selected' : ''}" onclick="toggleGroupMember('${c.name.replace(/'/g,"\\'")}')">
        <div style="display:flex; align-items:center; gap:12px;">
          <div class="avatar g${(i%5)+1}">${c.name.split(' ').map(n=>n[0]).join('')}</div>
          <div><div class="name">${c.name}</div><div class="sub">${c.sub}</div></div>
        </div>
        <div class="check">${selected ? '✓' : ''}</div>
      </div>`;
    }).join('');
}
function filterGroupContacts(v){ renderGroupContacts(v); }
function toggleGroupMember(name){
  if(selectedGroupMembers.includes(name)){
    selectedGroupMembers = selectedGroupMembers.filter(n=>n!==name);
  } else {
    selectedGroupMembers.push(name);
  }
  renderGroupContacts(document.querySelector('#modalOverlay .modal-search input')?.value || '');
  renderGroupChips();
}
function renderGroupChips(){
  const wrap = document.getElementById('groupChips');
  if(!wrap) return;
  wrap.innerHTML = selectedGroupMembers.map(name => `
    <div class="selected-chip">${name} <span class="x" onclick="toggleGroupMember('${name.replace(/'/g,"\\'")}')">✕</span></div>
  `).join('');
}
function confirmCreateGroup(){
  const nameInput = document.getElementById('groupNameInput');
  let groupName = nameInput ? nameInput.value.trim() : '';
  const ru = currentLang === 'ru';

  if(selectedGroupMembers.length < 2){
    showToast(ru ? 'Выберите минимум 2 участников' : 'Select at least 2 members');
    return;
  }
  if(!groupName){
    groupName = selectedGroupMembers.slice(0,3).join(', ') + (selectedGroupMembers.length > 3 ? '…' : '');
  }

  const newId = Math.max(...localChats.map(c=>c.id), 0) + 1;
  const initials = groupName.split(' ').map(n=>n[0]).filter(Boolean).slice(0,2).join('').toUpperCase() || '👥';
  const persona = null; // ИИ-боты убраны — группа не отвечает автоматически
  const firstSender = selectedGroupMembers[0];
  const now = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});

  localChats.unshift({
    id: newId,
    name: groupName,
    preview: ru ? `${currentUserName || 'Вы'} создал(а) группу` : `${currentUserName || 'You'} created the group`,
    time: ru ? 'сейчас' : 'now',
    unread: 0,
    avatarClass: 'g'+((newId%5)+1),
    avatarText: initials,
    pinned: false,
    persona,
    isGroup: true,
    members: selectedGroupMembers.slice(),
    groupSender: firstSender,
    messages: [
      {out:true, text: ru ? `${currentUserName || 'Вы'} создал(а) группу «${groupName}»` : `${currentUserName || 'You'} created the group "${groupName}"`, time: now, status:'read'}
    ]
  });

  closeModal();
  mergeAndRenderChats();
  openChat(newId);
  scheduleSaveChats();
  showToast(ru ? `Группа «${groupName}» создана 👥` : `Group "${groupName}" created 👥`);
}

// ------- Проверка номера телефона по SMS (Firebase Phone Auth) -------
// Если логин при регистрации похож на телефон (+79991234567) — сначала подтверждаем его кодом из SMS.
let pendingRegistration = null;   // {name, user, pass} — данные, отложенные до подтверждения кода
let pendingConfirmationResult = null; // результат signInWithPhoneNumber, нужен для confirm(code)
let recaptchaVerifier = null;

function isPhoneLogin(str){
  return /^\+\d{10,15}$/.test(str.trim());
}

function getRecaptchaVerifier(){
  if(!recaptchaVerifier){
    recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
      size: 'invisible'
    });
  }
  return recaptchaVerifier;
}

async function startPhoneVerification(name, user, pass){
  const errEl = document.getElementById('regError');
  const btn = document.getElementById('regBtn');
  try{
    const verifier = getRecaptchaVerifier();
    pendingConfirmationResult = await firebase.auth().signInWithPhoneNumber(user.trim(), verifier);
    pendingRegistration = {name, user, pass};
    renderAuthScreen('registerVerify');
  }catch(e){
    console.error(e);
    if(recaptchaVerifier){ try{ recaptchaVerifier.clear(); }catch(_){} recaptchaVerifier = null; }
    if(errEl) showAuthErr('regError', 'Не удалось отправить SMS. Проверьте номер и попробуйте снова.');
    if(btn){ btn.disabled = false; btn.textContent = 'Зарегистрироваться'; }
  }
}

async function handleConfirmSmsCode(){
  const codeEl = document.getElementById('smsCode');
  const errEl = document.getElementById('smsCodeError');
  const btn = document.getElementById('smsConfirmBtn');
  const code = codeEl ? codeEl.value.trim() : '';
  if(errEl) errEl.classList.remove('show');

  if(!code){ showAuthErr('smsCodeError', 'Введите код из SMS'); return; }
  if(!pendingConfirmationResult || !pendingRegistration){
    showAuthErr('smsCodeError', 'Сессия проверки истекла, начните регистрацию заново.');
    return;
  }

  btn.disabled = true; btn.textContent = 'Проверяем...';
  try{
    await pendingConfirmationResult.confirm(code);
    const { name, user, pass } = pendingRegistration;
    await createAccount(user, name, pass);
    rememberDevice(user);
    pendingRegistration = null;
    pendingConfirmationResult = null;
    await completeAuth(name, accId(user), {isPremium:false, premiumGiftedBy:null});
  }catch(e){
    console.error(e);
    showAuthErr('smsCodeError', 'Неверный код. Попробуйте ещё раз.');
  }finally{
    btn.disabled = false; btn.textContent = 'Подтвердить';
  }
}

// id аккаунта в базе — нормализуем логин/телефон, чтобы вход был регистронезависимым
function accId(user){ return encodeURIComponent(user.trim().toLowerCase()); }

// ------- Локальный fallback-режим (если Firebase не настроен) -------
function getLocalAccounts(){
  try{ return JSON.parse(localStorage.getItem('tg_accounts') || '{}'); }
  catch(e){ return {}; }
}
function saveLocalAccounts(acc){ localStorage.setItem('tg_accounts', JSON.stringify(acc)); }

async function findAccount(user){
  const id = accId(user);
  if(cloudReady){
    const snap = await db.collection('accounts').doc(id).get();
    return snap.exists ? snap.data() : null;
  }
  return getLocalAccounts()[id] || null;
}
async function createAccount(user, name, pass){
  const id = accId(user);
  if(cloudReady){
    await db.collection('accounts').doc(id).set({name, pass, login:user.trim(), isPremium:false, premiumGiftedBy:null});
  } else {
    const accounts = getLocalAccounts();
    accounts[id] = {name, pass, login:user.trim(), isPremium:false, premiumGiftedBy:null};
    saveLocalAccounts(accounts);
  }
}
